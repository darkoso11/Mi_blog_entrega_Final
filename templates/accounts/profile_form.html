{% extends 'base.html' %}

{% block title %}Editar perfil | Blog{% endblock %}

{% block content %}
<section class="form-panel">
    <h1>Editar perfil</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ user_form.as_p }}
        {{ profile_form.as_p }}
        <button class="button" type="submit">Guardar cambios</button>
    </form>
</section>
{% endblock %}
